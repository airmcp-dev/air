name: Bug Report
description: Report a bug in the air framework
title: "[Bug] "
labels: ["bug"]
body:
  - type: input
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      placeholder: "@airmcp-dev/core, @airmcp-dev/cli, etc."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.1"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "v22.x"
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Ubuntu 24, macOS 15, Windows 11"
